<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 자손결합자 */
    div p {    
      color: blue;
      margin-left: 50px;
    }
    
    /* 자식결합자 */
    div > p {
      color: crimson;
      margin-left: 0px;
    }
  </style>
</head>
<body>
  <div>
    <p>자식</p>
    <span><p>자손</p></span>
    <p>자식</p>
    
  </div>
</body>
</html>
